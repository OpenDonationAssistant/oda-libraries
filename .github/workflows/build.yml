# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build service and publish npm package

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string
      packaging:
        type: string
        required: false
        default: 'native-image'
      npm:
        type: boolean
        required: false
        default: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: '[{"id": "github", "username": "${{ secrets.MAVEN_USER }}", "password": "${{ secrets.MAVEN_TOKEN }}"}]'
          repositories: '[{"id":"github","name":"github","url":"https://maven.pkg.github.com/opendonationassistant/oda-libraries","snapshots":{"enabled":true}}]'

      - uses: actions/setup-node@v3
        if: inputs.npm == true
        with:
          node-version: "20"

      - name: Build with Maven
        run: "mvn -B -q clean package -Dpackaging=${{ inputs.packaging }} -DskipTests"

      - name: Install npm package
        if: inputs.npm == true
        run: npm install
        working-directory: "target/generated-sources/openapi/"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - uses: JS-DevTools/npm-publish@v3
        if: inputs.npm == true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          registry: "https://npm.pkg.github.com"
          package: "target/generated-sources/openapi/"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |  
            ghcr.io/opendonationassistant/oda-${{ inputs.service }}:${{ inputs.version }}
            ghcr.io/opendonationassistant/oda-${{ inputs.service }}:latest

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: opendonationassistant/docs
          ssh-key: ${{ secrets.SSH_GITHUB_KEY }}
          path: docs

      - name: Update OpenAPI docs
        run: |
          if ls target/classes/META-INF/swagger/*.yml 1>/dev/null 2>&1; then
            cp target/classes/META-INF/swagger/*.yml docs/api-reference/
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            cd docs/
            git add api-reference/${{ inputs.service }}-${{ inputs.version }}.yml
            git commit -m "docs: update ${{ inputs.service }} API spec"
            git push
          else
            echo "No Swagger YAML files found."
          fi
